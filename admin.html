<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>관리자 페이지</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f6f9;
}

input{
display:block;
margin:10px auto;
padding:8px;
}

button{
padding:8px 15px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#adminPanel{
margin-top:20px;
padding:20px;
background:white;
width:300px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<h2>런치리그 관리자 로그인</h2>

<input id="password" type="password" placeholder="관리자 비밀번호">
<button onclick="login()">로그인</button>

<div id="adminPanel" style="display:none">

<h3>경기 결과 입력</h3>

<input id="teamA" placeholder="팀A">
<input id="teamB" placeholder="팀B">

<input id="scoreA" placeholder="점수A">
<input id="scoreB" placeholder="점수B">

<input id="scorer" placeholder="득점자">
<input id="assist" placeholder="어시스트">

<button onclick="addMatch()">경기 저장</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
